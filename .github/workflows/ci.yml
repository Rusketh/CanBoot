name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-x86_64:
    name: x86_64 ${{ matrix.firmware }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        firmware: [bios, uefi]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc binutils \
            meson python3 \
            grub-pc-bin grub-common \
            gnu-efi ovmf \
            xorriso mtools dosfstools \
            qemu-system-x86

      - name: Configure
        run: cmake -B build -G Ninja -DCANBOOT_ARCH=x86_64

      - name: Build kernel ELF
        if: matrix.firmware == 'bios'
        run: cmake --build build --target canboot-x86_64 --verbose

      - name: Build UEFI binary
        if: matrix.firmware == 'uefi'
        run: cmake --build build --target canboot-uefi --verbose

      - name: Inspect kernel ELF
        if: matrix.firmware == 'bios'
        run: |
          file build/canboot-x86_64.elf
          readelf -h build/canboot-x86_64.elf
          readelf -lS build/canboot-x86_64.elf

      - name: Inspect UEFI PE
        if: matrix.firmware == 'uefi'
        run: |
          file build/canboot-x86_64-uefi.efi
          objdump -h build/canboot-x86_64-uefi.efi

      - name: Build BIOS ISO
        if: matrix.firmware == 'bios'
        run: bash scripts/mkiso-bios.sh
              build/canboot-x86_64.elf
              build/canboot-x86_64-bios.iso

      - name: Build UEFI ISO
        if: matrix.firmware == 'uefi'
        run: bash scripts/mkiso-uefi.sh
              build/canboot-x86_64-uefi.efi
              build/canboot-x86_64-uefi.iso

      - name: QEMU smoke test (BIOS)
        if: matrix.firmware == 'bios'
        run: bash tests/run-qemu-bios.sh build/canboot-x86_64-bios.iso

      - name: QEMU smoke test (UEFI)
        if: matrix.firmware == 'uefi'
        run: bash tests/run-qemu-uefi.sh build/canboot-x86_64-uefi.iso

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canboot-x86_64-${{ matrix.firmware }}
          path: |
            build/canboot-x86_64.elf
            build/canboot-x86_64-uefi.efi
            build/canboot-x86_64-bios.iso
            build/canboot-x86_64-uefi.iso
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-${{ matrix.firmware }}-log-x86_64
          path: |
            build/qemu-bios.log
            build/qemu-uefi.log
          if-no-files-found: ignore
          retention-days: 7

  build-aarch64:
    name: aarch64 ${{ matrix.firmware }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        firmware: [direct, uefi]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build make \
            meson python3 \
            gcc-aarch64-linux-gnu \
            qemu-system-arm qemu-system-misc \
            qemu-efi-aarch64 \
            mtools dosfstools \
            ntfs-3g
          # Sanity-check the aarch64 emulator is on PATH; fail loudly if not.
          which qemu-system-aarch64
          qemu-system-aarch64 --version

      - name: Configure
        run: cmake -B build-aarch64 -G Ninja
                -DCANBOOT_ARCH=aarch64
                -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-aarch64.cmake

      - name: Build kernel ELF + raw .bin
        if: matrix.firmware == 'direct'
        run: cmake --build build-aarch64 --target canboot-aarch64-bin --verbose

      - name: Build UEFI binary
        if: matrix.firmware == 'uefi'
        run: cmake --build build-aarch64 --target canboot-uefi --verbose

      - name: Inspect kernel ELF + raw image
        if: matrix.firmware == 'direct'
        run: |
          file build-aarch64/canboot-aarch64.elf
          aarch64-linux-gnu-readelf -h build-aarch64/canboot-aarch64.elf
          file build-aarch64/canboot-aarch64.bin

      - name: Inspect UEFI PE
        if: matrix.firmware == 'uefi'
        run: |
          file build-aarch64/canboot-aarch64-uefi.efi
          aarch64-linux-gnu-objdump -h build-aarch64/canboot-aarch64-uefi.efi

      - name: Build UEFI ESP image
        if: matrix.firmware == 'uefi'
        run: bash scripts/mkdisk-aarch64-uefi.sh
              build-aarch64/canboot-aarch64-uefi.efi
              build-aarch64/canboot-aarch64-uefi.img

      - name: QEMU smoke test (virt direct -kernel)
        if: matrix.firmware == 'direct'
        run: bash tests/run-qemu-aarch64.sh build-aarch64/canboot-aarch64.bin

      - name: QEMU smoke test (virt AAVMF UEFI)
        if: matrix.firmware == 'uefi'
        run: bash tests/run-qemu-aarch64-uefi.sh build-aarch64/canboot-aarch64-uefi.img

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canboot-aarch64-${{ matrix.firmware }}
          path: |
            build-aarch64/canboot-aarch64.elf
            build-aarch64/canboot-aarch64.bin
            build-aarch64/canboot-aarch64-uefi.efi
            build-aarch64/canboot-aarch64-uefi.img
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-aarch64-${{ matrix.firmware }}-log
          path: |
            build-aarch64/qemu-aarch64.log
            build-aarch64/qemu-aarch64.stderr.log
            build-aarch64/qemu-aarch64-uefi.log
            build-aarch64/qemu-aarch64-uefi.stderr.log
          if-no-files-found: ignore
          retention-days: 7
