name: Release

# Releases fire only on version tags (v*). Each architecture+firmware target
# is published as a self-contained .zip carrying a PXE tftp/ tree, the bootable
# ISO/image, the loose kernel/EFI files, and per-package checksums.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Override release tag (default: derived from trigger)'
        required: false
        type: string

permissions:
  contents: write   # softprops/action-gh-release uploads assets via the
                    # GitHub Releases API, which requires write access to
                    # repository contents.

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.arch }} ${{ matrix.firmware }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            firmware: bios
          - arch: x86_64
            firmware: uefi
          - arch: aarch64
            firmware: direct
          - arch: aarch64
            firmware: uefi

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc binutils \
            meson python3 \
            grub-pc-bin grub-common \
            gnu-efi ovmf \
            xorriso mtools dosfstools \
            qemu-system-x86 \
            zip

      - name: Install build deps (aarch64)
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build make \
            meson python3 \
            gcc-aarch64-linux-gnu \
            qemu-system-arm qemu-system-misc \
            qemu-efi-aarch64 \
            mtools dosfstools \
            ntfs-3g e2fsprogs \
            zip

      - name: Configure (x86_64)
        if: matrix.arch == 'x86_64'
        run: cmake -B build -G Ninja -DCANBOOT_ARCH=x86_64

      - name: Configure (aarch64)
        if: matrix.arch == 'aarch64'
        run: cmake -B build-aarch64 -G Ninja
              -DCANBOOT_ARCH=aarch64
              -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-aarch64.cmake

      # ---- x86_64 BIOS ----------------------------------------------
      - name: Build + package (x86_64 BIOS)
        if: matrix.arch == 'x86_64' && matrix.firmware == 'bios'
        run: |
          cmake --build build --target canboot-x86_64 --verbose
          bash scripts/mkiso/bios.sh \
            build/canboot-x86_64.elf \
            build/canboot-x86_64-bios.iso
          PKG=pkg
          mkdir -p "$PKG"
          cp build/canboot-x86_64.elf       "$PKG/canboot-x86_64.elf"
          cp build/canboot-x86_64-bios.iso  "$PKG/canboot-x86_64-bios.iso"
          bash scripts/mkpxe.sh x86_64 bios build/canboot-x86_64.elf "$PKG"
          ( cd "$PKG" && sha256sum $(find . -type f | sort) > SHA256SUMS )
          mkdir -p dist
          ( cd "$PKG" && zip -r -q ../dist/canboot-x86_64-bios.zip . )

      # ---- x86_64 UEFI ----------------------------------------------
      - name: Build + package (x86_64 UEFI)
        if: matrix.arch == 'x86_64' && matrix.firmware == 'uefi'
        run: |
          cmake --build build --target canboot-uefi --verbose
          bash scripts/mkiso/uefi.sh \
            build/canboot-x86_64-uefi.efi \
            build/canboot-x86_64-uefi.iso
          PKG=pkg
          mkdir -p "$PKG"
          cp build/canboot-x86_64-uefi.efi  "$PKG/canboot-x86_64-uefi.efi"
          cp build/canboot-x86_64-uefi.iso  "$PKG/canboot-x86_64-uefi.iso"
          bash scripts/mkpxe.sh x86_64 uefi build/canboot-x86_64-uefi.efi "$PKG"
          ( cd "$PKG" && sha256sum $(find . -type f | sort) > SHA256SUMS )
          mkdir -p dist
          ( cd "$PKG" && zip -r -q ../dist/canboot-x86_64-uefi.zip . )

      # ---- aarch64 direct (-kernel) ---------------------------------
      - name: Build + package (aarch64 direct)
        if: matrix.arch == 'aarch64' && matrix.firmware == 'direct'
        run: |
          cmake --build build-aarch64 --target canboot-aarch64-bin --verbose
          PKG=pkg
          mkdir -p "$PKG"
          cp build-aarch64/canboot-aarch64.elf  "$PKG/canboot-aarch64.elf"
          cp build-aarch64/canboot-aarch64.bin  "$PKG/canboot-aarch64.bin"
          bash scripts/mkpxe.sh aarch64 direct build-aarch64/canboot-aarch64.bin "$PKG"
          ( cd "$PKG" && sha256sum $(find . -type f | sort) > SHA256SUMS )
          mkdir -p dist
          ( cd "$PKG" && zip -r -q ../dist/canboot-aarch64-direct.zip . )

      # ---- aarch64 UEFI ---------------------------------------------
      - name: Build + package (aarch64 UEFI)
        if: matrix.arch == 'aarch64' && matrix.firmware == 'uefi'
        run: |
          cmake --build build-aarch64 --target canboot-uefi --verbose
          bash scripts/mkdisk/aarch64-uefi.sh \
            build-aarch64/canboot-aarch64-uefi.efi \
            build-aarch64/canboot-aarch64-uefi.img
          PKG=pkg
          mkdir -p "$PKG"
          cp build-aarch64/canboot-aarch64-uefi.efi  "$PKG/canboot-aarch64-uefi.efi"
          cp build-aarch64/canboot-aarch64-uefi.img  "$PKG/canboot-aarch64-uefi.img"
          bash scripts/mkpxe.sh aarch64 uefi build-aarch64/canboot-aarch64-uefi.efi "$PKG"
          ( cd "$PKG" && sha256sum $(find . -type f | sort) > SHA256SUMS )
          mkdir -p dist
          ( cd "$PKG" && zip -r -q ../dist/canboot-aarch64-uefi.zip . )

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: canboot-${{ matrix.arch }}-${{ matrix.firmware }}
          path: dist/*.zip
          retention-days: 14
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # tag history for changelog generation

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts/ -type f -name '*.zip' -exec cp {} release/ \;
          # One aggregated checksum file over the published zips.
          ( cd release && sha256sum *.zip > SHA256SUMS.txt )
          echo "=== Release contents ==="
          ls -la release/

      - name: Decide tag
        id: meta
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
              TAG="${{ inputs.tag }}"
          else
              TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >>"$GITHUB_OUTPUT"
          echo "Selected tag=$TAG"

      - name: Build release notes
        id: notes
        run: |
          {
              echo "## CanBoot ${{ steps.meta.outputs.tag }}"
              echo ""
              echo "Stable release tagged \`${{ steps.meta.outputs.tag }}\`."
              echo ""
              echo "Each target ships as a self-contained \`.zip\`: a \`tftp/\`"
              echo "folder for PXE/netboot, the bootable ISO/image, the loose"
              echo "kernel/EFI files, a \`dnsmasq.conf\` template, and \`SHA256SUMS\`."
              echo ""
              echo "### Packages"
              echo ""
              echo "| Package | Boot media | Notes |"
              echo "|---------|-----------|-------|"
              echo "| canboot-x86_64-bios.zip    | canboot-x86_64-bios.iso  | BIOS: GRUB/Multiboot2 ISO + GRUB PXE tftp/ tree |"
              echo "| canboot-x86_64-uefi.zip    | canboot-x86_64-uefi.iso  | UEFI: ESP ISO + BOOTX64.EFI tftp/ tree |"
              echo "| canboot-aarch64-direct.zip | (none, -kernel)          | Flat .bin + .elf; tftp/ carries the flat image |"
              echo "| canboot-aarch64-uefi.zip   | canboot-aarch64-uefi.img | UEFI: ESP image + BOOTAA64.EFI tftp/ tree |"
              echo "| any                        | SHA256SUMS.txt           | sha256(zip) for each package |"
              echo ""
              echo "### Verify"
              echo ""
              echo "\`\`\`"
              echo "sha256sum -c SHA256SUMS.txt"
              echo "\`\`\`"
              echo ""
              echo "### PXE / netboot"
              echo ""
              echo "Unzip a package, serve its \`tftp/\` contents from a TFTP root,"
              echo "and start a DHCP server using the bundled \`dnsmasq.conf\`. CanBoot"
              echo "learns the TFTP server from DHCP and pulls \`/init.cdo\` over TFTP."
              echo "See [docs/running.md](https://github.com/${{ github.repository }}/blob/main/docs/running.md)."
          } > release-notes.md
          cat release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "CanBoot ${{ steps.meta.outputs.tag }}"
          body_path: release-notes.md
          prerelease: false
          files: release/*
          make_latest: true
